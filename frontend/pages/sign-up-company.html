<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/sign-up-company.css" />
    <title>Cadastro empresa</title>
  </head>
  <body>
    <h1>Cadastro empresa</h1>
    <form id="sign-up-form" method="post">
      <div class="form-group">
        <label for="companyName">Nome:</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="cnpj">CNPJ:</label>
        <input type="text" id="cnpj" name="cnpj" required />
      </div>

      <div class="form-group">
        <label for="street">Rua:</label>
        <input type="text" id="street" name="street" required />
      </div>

      <div class="form-group">
        <label for="city">Cidade:</label>
        <input type="text" id="city" name="city" required />
      </div>

      <div class="form-group">
        <label for="state">Estado:</label>
        <input type="text" id="state" name="state" required />
      </div>

      <div class="form-group">
        <label for="postalCode">CEP:</label>
        <input
          type="text"
          id="postalCode"
          name="postalCode"
          pattern="\d{5}-?\d{3}"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="password">Senha:</label>
        <div class="password-input-container">
          <input
            type="password"
            id="password"
            name="password"
            pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[A-Z])(?=.*[!@#\$%\^&\*])[A-Za-z\d!@#\$%\^&\*]{8,}$"
            title="A senha deve ter no mínimo 8 caracteres, com pelo menos uma letra minúscula, uma letra maiúscula, um número e um caractere especial."
            required
          />
          <img id="eye-password" src="../icons/eye-outline.svg" />
        </div>
      </div>

      <button type="submit">Cadastrar</button>
    </form>

    <script type="module" src="../scripts/sign_up_company.js"></script>
  </body>
</html>
