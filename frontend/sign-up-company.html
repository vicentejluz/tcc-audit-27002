<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro empresa</title>
    <style>
      body {
        display: none;
      }

      form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        width: 50%;
        margin: 0 auto;
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }

      .form-group label {
        margin-bottom: 8px;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
        width: 95%;
        margin-bottom: 8px;
      }

      input[type="text"] {
        margin-right: 8px;
      }

      button[type="submit"] {
        grid-column: 1 / 3;
        margin-top: 16px;
        padding: 8px;
        border-radius: 4px;
        border: none;
        background-color: #007bff;
        color: #fff;
        cursor: pointer;
        width: 30%;
        margin: 0 auto;
      }

      button[type="submit"]:hover {
        background-color: #0069d9;
      }

      h1 {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>Cadastro empresa</h1>
    <form id="sign-up-form" method="post">
      <div class="form-group">
        <label for="companyName">Nome:</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-group">
        <label for="cnpj">CNPJ:</label>
        <input type="text" id="cnpj" name="cnpj" required />
      </div>

      <div class="form-group">
        <label for="street">Rua:</label>
        <input type="text" id="street" name="street" required />
      </div>

      <div class="form-group">
        <label for="city">Cidade:</label>
        <input type="text" id="city" name="city" required />
      </div>

      <div class="form-group">
        <label for="state">Estado:</label>
        <input type="text" id="state" name="state" required />
      </div>

      <div class="form-group">
        <label for="postalCode">CEP:</label>
        <input
          type="text"
          id="postalCode"
          name="postalCode"
          pattern="\d{5}-?\d{3}"
          required
        />
      </div>

      <div class="form-group">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="password">Senha:</label>
        <input
          type="password"
          id="password"
          name="password"
          pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[A-Z])(?=.*[!@#\$%\^&\*])[A-Za-z\d!@#\$%\^&\*]{8,}$"
          title="A senha deve ter no mínimo 8 caracteres, com pelo menos uma letra minúscula, uma letra maiúscula, um número e um caractere especial."
          required
        />
      </div>

      <button type="submit">Cadastrar</button>
    </form>

    <script src="script_sign_up_company.js"></script>
  </body>
</html>
